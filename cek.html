<!DOCTYPE html><html lang="id"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cek Antrian - Puskesmas Sehat Bersama</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
<style>body{font-family:'Poppins',sans-serif}</style>
</head><body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
<div class="bg-white w-full max-w-md p-8 rounded-3xl shadow-xl text-center">
  <h1 class="text-2xl font-bold text-blue-600 mb-6">Cek Posisi Antrian</h1>
  <div id="loading">Memuat data...</div>

  <div id="hasil" class="hidden">
    <p class="text-gray-600">Halo, <span id="nama" class="font-bold"></span></p>
    <div class="text-7xl font-black text-blue-600 my-4" id="nomor">A01</div>

    <div id="statusBox" class="p-6 rounded-2xl my-6">
      <div class="text-lg font-bold" id="statusText">MENUNGGU</div>
      <div class="text-4xl font-black mt-2">Posisi: <span id="posisi">1</span></div>
      <div class="mt-2">Estimasi dipanggil: <span id="estimasi" class="font-bold">10:30</span></div>
    </div>

    <p class="text-sm text-gray-500">Status update otomatis setiap 10 detik</p>
    <a href="index.html" class="block mt-6 text-blue-600 font-semibold">← Kembali ke Beranda</a>
  </div>

  <div id="error" class="hidden text-red-600">Nomor antrian tidak ditemukan</div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzM6D735ryPazkudEqGZO0lF7mx-gotvyiiQ7neMMH52s3wtVm7yodTz_-WNHCvdWyVhQ/exec?action=";
const no = new URLSearchParams(location.search).get('no');

async function cek() {
  if(!no) return document.getElementById('error').classList.remove('hidden');
  const r = await fetch(`${API}cek&no=${no}`);
  const d = await r.json();

  document.getElementById('loading').classList.add('hidden');
  if(d.status !== 'ok') return document.getElementById('error').classList.remove('hidden');

  document.getElementById('hasil').classList.remove('hidden');
  document.getElementById('nama').textContent = d.data.Nama;
  document.getElementById('nomor').textContent = d.data.No_Antrian;
  document.getElementById('posisi').textContent = d.posisi;
  document.getElementById('estimasi').textContent = d.estimasi;

  const box = document.getElementById('statusBox');
  const st = d.data.Status;
  if(st === 'dipanggil') {
    box.className = 'p-6 rounded-2xl my-6 bg-green-100 text-green-800';
    document.getElementById('statusText').textContent = 'GILIRAN ANDA! Ke ' + d.data.Loket;
  } else if(st === 'selesai') {
    box.className = 'p-6 rounded-2xl my-6 bg-gray-100 text-gray-800';
    document.getElementById('statusText').textContent = 'SELESAI';
  } else {
    box.className = 'p-6 rounded-2xl my-6 bg-yellow-100 text-yellow-800';
    document.getElementById('statusText').textContent = 'MENUNGGU';
  }
}
cek(); setInterval(cek, 10000);
</script></body></html>
