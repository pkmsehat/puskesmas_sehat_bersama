<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kritik & Saran - Puskesmas Sehat Bersama</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>body{font-family:'Poppins',sans-serif}</style>
</head>
<body class="bg-gradient-to-br from-green-50 to-blue-50 min-h-screen p-4">

<div class="max-w-2xl mx-auto">
  <a href="index.html" class="inline-block mb-6 text-teal-600 hover:text-teal-700">
    <i class="fa-solid fa-arrow-left mr-2"></i>Kembali ke Beranda
  </a>

  <div class="bg-white p-8 rounded-3xl shadow-2xl">
    <div class="text-center mb-6">
      <i class="fa-solid fa-comment-dots text-4xl text-teal-600 mb-3"></i>
      <h1 class="text-2xl font-bold text-teal-700">Kritik & Saran</h1>
      <p class="text-gray-500 text-sm mt-1">Masukan Anda membantu kami menjadi lebih baik</p>
    </div>

    <form id="formKritik" class="space-y-4">
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Nama</label>
          <input type="text" id="nama" required class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-teal-500 outline-none">
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">No. HP</label>
          <input type="tel" id="hp" required class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-teal-500 outline-none">
        </div>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Jenis Masukan</label>
        <select id="jenis" required class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-teal-500 outline-none">
          <option value="">Pilih jenis</option>
          <option value="Kritik">Kritik</option>
          <option value="Saran">Saran</option>
          <option value="Pujian">Pujian</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Pesan Anda *</label>
        <textarea id="pesan" rows="5" required class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-teal-500 outline-none" placeholder="Tulis kritik atau saran Anda di sini..."></textarea>
      </div>

      <button type="submit" id="btnKirim" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 rounded-xl transition duration-300">
        <i class="fa-solid fa-paper-plane mr-2"></i>Kirim Masukan
      </button>
    </form>
  </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzsOdyzO13CMcrBNru_CpVxKqX1OJh81TdLeFHDoF3d7AU8f_jxibQ1rmiUHqqopb6fEQ/exec";

document.getElementById('formKritik').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('btnKirim');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>Mengirim...';

  const data = {
    action: 'kritikSaran',
    nama: document.getElementById('nama').value,
    hp: document.getElementById('hp').value,
    jenis: document.getElementById('jenis').value,
    pesan: document.getElementById('pesan').value
  };

  try {
    const res = await fetch(API, {method: 'POST', body: JSON.stringify(data)});
    const hasil = await res.json();
    if(hasil.status === 'ok') {
      alert('✅ Terima kasih! Masukan Anda sudah kami terima.');
      document.getElementById('formKritik').reset();
    } else {
      alert('❌ ' + hasil.message);
    }
  } catch(err) {
    alert('❌ Koneksi error. Coba lagi.');
  }
  
  btn.disabled = false;
  btn.innerHTML = '<i class="fa-solid fa-paper-plane mr-2"></i>Kirim Masukan';
});
</script>
</body>
</html>
