<!DOCTYPE html><html lang="id"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antrian Live - Puskesmas Sehat Bersama</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  body{font-family:'Poppins',sans-serif}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
 .pulse{animation:pulse 2s infinite}
</style>
</head><body class="bg-gradient-to-br from-purple-700 to-blue-800 min-h-screen p-6 text-white">
<div class="max-w-7xl mx-auto">
  <header class="bg-white/10 backdrop-blur-md rounded-2xl p-4 mb-6 flex justify-between items-center">
    <div><h1 id="namaPkm" class="text-2xl font-black">PUSKESMAS SEHAT BERSAMA</h1><p class="text-sm opacity-80">Sistem Antrian Digital</p></div>
    <div class="text-right"><div id="jam" class="text-4xl font-black">00:00:00</div><div id="tanggal" class="text-sm opacity-80">Memuat...</div></div>
  </header>

  <div class="grid lg:grid-cols-2 gap-6">
    <div class="bg-white/10 backdrop-blur-md rounded-3xl p-8">
      <h2 class="text-xl font-bold mb-4">🔔 SEDANG DIPANGGIL</h2>
      <div id="cardPanggil" class="bg-gradient-to-r from-pink-500 to-red-500 rounded-2xl p-10 text-center pulse">
        <div id="nomorPanggil" class="text-9xl font-black">--</div>
        <div id="namaPanggil" class="text-3xl font-bold mt-2">Menunggu...</div>
        <div id="loketPanggil" class="text-xl opacity-90 mt-1">-</div>
      </div>
    </div>

    <div class="bg-white/10 backdrop-blur-md rounded-3xl p-8">
      <h2 class="text-xl font-bold mb-4">📋 ANTRIAN BERIKUTNYA</h2>
      <div id="listAntrian" class="space-y-3">
        <div class="text-center py-10 opacity-70">Memuat data...</div>
      </div>
    </div>
  </div>

  <footer class="text-center mt-6 text-sm opacity-70">
    Total pasien hari ini: <span id="totalHariIni">0</span> | Rata-rata tunggu: <span id="rataMenit">0</span> menit
  </footer>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbytiOmk3hIj-hYcNqNg4dUTUk24ZAg-oJlRbyZI_XK8-f1ocHBCtBjTEucyfSLtCNzDAg/exec?action=";
function updateJam() {
  const n = new Date();
  document.getElementById('jam').textContent = n.toLocaleTimeString('id-ID');
  document.getElementById('tanggal').textContent = n.toLocaleDateString('id-ID', {weekday:'long',year:'numeric',month:'long',day:'numeric'});
}
setInterval(updateJam, 1000); updateJam();

async function load() {
  try {
    const r = await fetch(API + 'getPublic');
    const d = await r.json();
    document.getElementById('namaPkm').textContent = d.namaPkm || 'PUSKESMAS SEHAT BERSAMA';

    if(d.dipanggil) {
      document.getElementById('nomorPanggil').textContent = d.dipanggil.No_Antrian;
      document.getElementById('namaPanggil').textContent = d.dipanggil.Nama;
      document.getElementById('loketPanggil').textContent = d.dipanggil.Loket;
    } else {
      document.getElementById('nomorPanggil').textContent = '--';
      document.getElementById('namaPanggil').textContent = 'Menunggu...';
      document.getElementById('loketPanggil').textContent = '-';
    }

    document.getElementById('listAntrian').innerHTML = d.antrian.length ? d.antrian.map(x => `
      <div class="bg-white/20 p-4 rounded-xl flex justify-between items-center">
        <div><div class="text-3xl font-bold">${x.No_Antrian}</div><div class="text-sm opacity-80">${x.Nama} - ${x.Poli}</div></div>
        <span class="bg-yellow-400 text-black px-3 py-1 rounded-full text-xs font-bold">MENUNGGU</span>
      </div>
    `).join('') : '<div class="text-center py-10 opacity-70">Antrian kosong</div>';

    document.getElementById('totalHariIni').textContent = d.totalHariIni;
    document.getElementById('rataMenit').textContent = d.rataMenit;
  } catch(e) { console.log(e) }
}
load(); setInterval(load, 3000);
</script></body></html>
