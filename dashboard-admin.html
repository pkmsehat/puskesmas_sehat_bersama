<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Admin - Puskesmas Sehat Bersama</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0fdf4; }
  </style>
</head>
<body>
  <header class="bg-white shadow sticky top-0 z-50">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <img src="logo.png" alt="Logo" class="w-10 h-10 object-contain">
        <div>
          <h1 class="font-bold text-teal-700">PUSKESMAS SEHAT BERSAMA</h1>
          <p class="text-xs text-gray-500">Dashboard Admin - Live Data</p>
        </div>
      </div>
      <a href="login.html" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg text-sm">
        <i class="fa-solid fa-right-from-bracket"></i> Logout
      </a>
    </div>
  </header>

  <main class="container mx-auto p-6">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-2xl font-bold text-gray-800">Selamat Datang, Admin!</h2>
      <button onclick="loadData()" class="bg-teal-600 hover:bg-teal-700 text-white px-4 py-2 rounded-lg text-sm">
        <i class="fa-solid fa-rotate"></i> Refresh Data
      </button>
    </div>

    <!-- Total Card -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
      <div class="bg-white p-5 rounded-xl shadow border-l-4 border-teal-600">
        <h3 class="font-bold text-sm text-teal-700 mb-1">TOTAL HARI INI</h3>
        <p class="text-3xl font-bold" id="totalSemua">0</p>
        <p class="text-xs text-gray-500">Semua poli</p>
      </div>

      <div class="bg-white p-5 rounded-xl shadow">
        <h3 class="font-bold text-sm text-teal-700 mb-1">POLI UMUM</h3>
        <p class="text-2xl font-bold" id="totalUmum">0</p>
        <p class="text-xs text-gray-500">Menunggu: <span id="menungguUmum">0</span></p>
      </div>

      <div class="bg-white p-5 rounded-xl shadow">
        <h3 class="font-bold text-sm text-blue-600 mb-1">POLI GIGI</h3>
        <p class="text-2xl font-bold" id="totalGigi">0</p>
        <p class="text-xs text-gray-500">Menunggu: <span id="menungguGigi">0</span></p>
      </div>

      <div class="bg-white p-5 rounded-xl shadow">
        <h3 class="font-bold text-sm text-pink-600 mb-1">KIA / ANAK</h3>
        <p class="text-2xl font-bold" id="totalKIA">0</p>
        <p class="text-xs text-gray-500">Menunggu: <span id="menungguKIA">0</span></p>
      </div>
    </div>

    <!-- Antrian Sekarang -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
      <div class="bg-teal-50 p-4 rounded-xl">
        <p class="text-sm text-gray-600">Dipanggil Poli Umum</p>
        <p class="text-2xl font-bold text-teal-700" id="dipanggilUmum">-</p>
      </div>
      <div class="bg-blue-50 p-4 rounded-xl">
        <p class="text-sm text-gray-600">Dipanggil Poli Gigi</p>
        <p class="text-2xl font-bold text-blue-700" id="dipanggilGigi">-</p>
      </div>
      <div class="bg-pink-50 p-4 rounded-xl">
        <p class="text-sm text-gray-600">Dipanggil KIA/Anak</p>
        <p class="text-2xl font-bold text-pink-700" id="dipanggilKIA">-</p>
      </div>
    </div>

    <div class="bg-white p-6 rounded-xl shadow">
      <h3 class="font-bold text-lg mb-4">Info Data</h3>
      <div id="statusLoad" class="text-sm text-gray-500 mb-3">Terakhir update: -</div>
      <button onclick="cetakLaporan()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm">
        <i class="fa-solid fa-print"></i> Cetak Laporan Hari Ini
      </button>
    </div>
  </main>

<script>
const SHEET_CSV_URL = 'PASTE_LINK_CSV_DISINI'; // <- GANTI INI

async function loadData() {
  document.getElementById('statusLoad').innerText = 'Mengambil data...';
  try {
    const res = await fetch(SHEET_CSV_URL);
    const csv = await res.text();
    const rows = csv.split('\n').slice(1); // skip header

    let data = { Umum: [], Gigi: [], KIA: [] };
    let dipanggil = { Umum: '-', Gigi: '-', KIA: '-' };

    rows.forEach(row => {
      if (!row.trim()) return;
      const cols = row.split(',');
      // Kolom: 0=Timestamp, 1=No, 2=No_Antrian, 3=Nama, 4=Poli, 5=No_HP, 6=Status, 7=Loket, 8=Dipanggil_Jam, 9=Petugas
      const noAntrian = cols?.trim() || '';
      const poli = cols?.trim() || '';
      const status = cols?.trim().toLowerCase() || '';

      if (poli.includes('Umum')) {
        data.Umum.push(status);
        if (status === 'dipanggil') dipanggil.Umum = noAntrian;
      }
      else if (poli.includes('Gigi')) {
        data.Gigi.push(status);
        if (status === 'dipanggil') dipanggil.Gigi = noAntrian;
      }
      // Poli Anak masuk ke KIA
      else if (poli.includes('KIA') || poli.includes('KB') || poli.includes('Anak')) {
        data.KIA.push(status);
        if (status === 'dipanggil') dipanggil.KIA = noAntrian;
      }
    });

    // Update Total
    document.getElementById('totalUmum').innerText = data.Umum.length;
    document.getElementById('totalGigi').innerText = data.Gigi.length;
    document.getElementById('totalKIA').innerText = data.KIA.length;
    document.getElementById('totalSemua').innerText = data.Umum.length + data.Gigi.length + data.KIA.length;

    // Update Menunggu
    document.getElementById('menungguUmum').innerText = data.Umum.filter(s => s === 'menunggu').length;
    document.getElementById('menungguGigi').innerText = data.Gigi.filter(s => s === 'menunggu').length;
    document.getElementById('menungguKIA').innerText = data.KIA.filter(s => s === 'menunggu').length;

    // Update Dipanggil
    document.getElementById('dipanggilUmum').innerText = dipanggil.Umum;
    document.getElementById('dipanggilGigi').innerText = dipanggil.Gigi;
    document.getElementById('dipanggilKIA').innerText = dipanggil.KIA;

    document.getElementById('statusLoad').innerText = 'Terakhir update: ' + new Date().toLocaleTimeString('id-ID');
  } catch (e) {
    document.getElementById('statusLoad').innerText = 'Gagal load. Pastikan Sheet sudah di-publish!';
    console.error(e);
  }
}

function cetakLaporan() {
  window.print();
}

loadData();
setInterval(loadData, 20000);
</script>
</body>
</html>
