<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register Akun - Puskesmas Sehat Bersama</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Segoe UI', system-ui, sans-serif; 
      background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 20px 0;
    }
    .container { max-width: 500px; margin: 0 auto; padding: 20px; width: 100%; }
    .card { 
      background: white; 
      padding: 35px 30px; 
      border-radius: 16px; 
      box-shadow: 0 10px 25px #0001; 
    }
    .logo { text-align: center; margin-bottom: 20px; }
    .logo img { width: 60px; }
    h1 { color: #047857; margin-bottom: 8px; text-align: center; font-size: 1.8rem; }
    .subtitle { color: #64748b; text-align: center; margin-bottom: 30px; font-size: 0.95rem; }
    .form-group { margin-bottom: 16px; }
    .form-group label { 
      display: block; 
      margin-bottom: 6px; 
      font-weight: 500; 
      color: #334155; 
      font-size: 0.9rem;
    }
    .form-group input { 
      width: 100%; 
      padding: 12px 14px; 
      border: 1px solid #cbd5e1; 
      border-radius: 8px; 
      font-size: 1rem;
      transition: all 0.2s;
    }
    .form-group input:focus { 
      outline: none; 
      border-color: #047857;
      box-shadow: 0 0 0 3px #dcfce7;
    }
    .form-row { display: flex; gap: 12px; }
    .form-row .form-group { flex: 1; }
    .btn { 
      width: 100%; 
      padding: 13px; 
      border: none; 
      border-radius: 8px; 
      font-weight: 600; 
      font-size: 1rem; 
      cursor: pointer; 
      background: #047857; 
      color: white;
      transition: 0.2s;
      margin-top: 8px;
    }
    .btn:hover { background: #065f46; }
    .btn:disabled { background: #94a3b8; cursor: not-allowed; }
    .alert { 
      padding: 12px; 
      border-radius: 8px; 
      margin-bottom: 18px; 
      font-size: 0.9rem; 
    }
    .alert-error { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }
    .alert-success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
    .links { text-align: center; margin-top: 25px; color: #64748b; font-size: 0.9rem; }
    .links a { color: #1d4ed8; text-decoration: none; font-weight: 600; }
    .links a:hover { text-decoration: underline; }
    .back { text-align: center; margin-top: 15px; }
    .back a { color: #64748b; text-decoration: none; font-size: 0.9rem; }
    .required { color: #dc2626; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a4/Logo_Kementerian_Kesehatan_Republik_Indonesia.png/600px-Logo_Kementerian_Kesehatan_Republik_Indonesia.png" alt="Logo">
      </div>
      <h1>Buat Akun Baru</h1>
      <p class="subtitle">Daftar dulu sebelum ambil antrian online</p>
      
      <div id="alert"></div>

      <form id="register-form">
        <div class="form-group">
          <label>NIK <span class="required">*</span></label>
          <input type="text" id="nik" maxlength="16" pattern="\d{16}" placeholder="16 digit NIK" required>
        </div>
        <div class="form-group">
          <label>Nama Lengkap <span class="required">*</span></label>
          <input type="text" id="nama" placeholder="Sesuai KTP" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>No. HP / WA <span class="required">*</span></label>
            <input type="tel" id="hp" placeholder="08xxxxxxxxxx" required>
          </div>
          <div class="form-group">
            <label>Tanggal Lahir <span class="required">*</span></label>
            <input type="date" id="tgl_lahir" required>
          </div>
        <div class="form-group">
          <label>Alamat Lengkap <span class="required">*</span></label>
          <input type="text" id="alamat" placeholder="Jl. Contoh No. 123, RT/RW" required>
        </div>
        <div class="form-group">
          <label>Buat Password <span class="required">*</span></label>
          <input type="password" id="password" minlength="6" placeholder="Minimal 6 karakter" required>
        </div>
        <button type="submit" class="btn" id="btn-register">Daftar Akun Sekarang</button>
      </form>

      <div class="links">
        Sudah punya akun? <a href="login.html">Login di sini</a>
      </div>
      <div class="back">
        <a href="index.html">← Kembali ke Beranda</a>
      </div>
    </div>
  </div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyBuSyOsHl1tFl7HeCc1kUj8Hs_24J_x_XbQ8SlswB7dayVMCjVQyAgRZASrcjbUwiE/exec";

function showAlert(msg, type) {
  document.getElementById('alert').innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

document.getElementById('register-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('btn-register');
  btn.disabled = true;
  btn.textContent = 'Mendaftarkan...';
  
  const nik = document.getElementById('nik').value;
  if(nik.length !== 16) {
    showAlert('NIK harus 16 digit', 'error');
    btn.disabled = false;
    btn.textContent = 'Daftar Akun Sekarang';
    return;
  }

  const data = {
    action: 'register',
    nik: nik,
    nama: document.getElementById('nama').value,
    hp: document.getElementById('hp').value,
    tgl_lahir: document.getElementById('tgl_lahir').value,
    alamat: document.getElementById('alamat').value,
    password: document.getElementById('password').value
  };
  
  try {
    const res = await fetch(API_URL, { 
      method: 'POST', 
      body: JSON.stringify(data) 
    });
    const hasil = await res.json();
    
    if(hasil.status === 'ok') {
      showAlert('Registrasi berhasil! Anda akan dialihkan ke halaman login...', 'success');
      document.getElementById('register-form').reset();
      setTimeout(() => window.location.href = 'login.html', 2000);
    } else {
      showAlert(hasil.message || 'Registrasi gagal. NIK mungkin sudah terdaftar', 'error');
      btn.disabled = false;
      btn.textContent = 'Daftar Akun Sekarang';
    }
  } catch(err) {
    showAlert('Gagal terhubung ke server. Coba lagi', 'error');
    btn.disabled = false;
    btn.textContent = 'Daftar Akun Sekarang';
  }
});
</script>
</body>
</html>
