<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Puskesmas Sehat Bersama</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>body{font-family:'Poppins',sans-serif}</style>
</head>
<body class="bg-gradient-to-br from-green-50 to-blue-50 min-h-screen flex items-center justify-center p-4">

<div class="bg-white w-full max-w-lg p-8 rounded-3xl shadow-2xl">
  <div class="text-center mb-6">
    <i class="fa-solid fa-hospital text-4xl text-teal-600 mb-3"></i>
    <h1 class="text-2xl font-bold text-teal-700">Buat Akun Baru</h1>
    <p class="text-gray-500 text-sm mt-1">Daftar dulu sebelum ambil antrian online</p>
  </div>

  <form id="formReg" class="space-y-4">
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">NIK *</label>
      <input type="text" id="nik" maxlength="16" pattern="\d{16}" required
        class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-teal-500 focus:border-transparent outline-none"
        placeholder="16 digit NIK">
    </div>

    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">Nama Lengkap *</label>
      <input type="text" id="nama" required
        class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-teal-500 focus:border-transparent outline-none"
        placeholder="Sesuai KTP">
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">No. HP / WA *</label>
        <input type="tel" id="hp" required
          class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-teal-500 focus:border-transparent outline-none"
          placeholder="08xxxxxxxxxx">
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Tanggal Lahir *</label>
        <input type="date" id="tgl" required
          class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-teal-500 focus:border-transparent outline-none">
      </div>
    </div>

    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">Alamat Lengkap *</label>
      <textarea id="alamat" rows="2" required
        class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-teal-500 focus:border-transparent outline-none"
        placeholder="Jl. Contoh No. 123, RT/RW"></textarea>
    </div>

    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">Buat Password *</label>
      <input type="password" id="pass" minlength="6" required
        class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-teal-500 focus:border-transparent outline-none"
        placeholder="Minimal 6 karakter">
    </div>

    <button type="submit" id="btnReg"
      class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 rounded-xl transition duration-300 shadow-lg">
      <i class="fa-solid fa-user-plus mr-2"></i>Daftar Akun Sekarang
    </button>
  </form>

  <div class="text-center mt-6 text-sm">
    <p class="text-gray-600">Sudah punya akun? 
      <a href="login.html" class="text-teal-600 font-semibold hover:underline">Login di sini</a>
    </p>
    <a href="index.html" class="inline-block mt-3 text-gray-500 hover:text-teal-600">
      <i class="fa-solid fa-arrow-left mr-1"></i>Kembali ke Beranda
    </a>
  </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzsOdyzO13CMcrBNru_CpVxKqX1OJh81TdLeFHDoF3d7AU8f_jxibQ1rmiUHqqopb6fEQ/exec";

document.getElementById('formReg').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('btnReg');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>Mendaftar...';

  const data = {
    action: 'register',
    nik: document.getElementById('nik').value,
    nama: document.getElementById('nama').value,
    hp: document.getElementById('hp').value,
    tgl_lahir: document.getElementById('tgl').value,
    alamat: document.getElementById('alamat').value,
    password: document.getElementById('pass').value
  };

  try {
    const res = await fetch(API, {method: 'POST', body: JSON.stringify(data)});
    const hasil = await res.json();
    
    if(hasil.status === 'ok') {
      alert('✅ Pendaftaran berhasil! Silakan login.');
      window.location.href = 'login.html';
    } else {
      alert('❌ ' + hasil.message);
    }
  } catch(err) {
    alert('❌ Koneksi error. Coba lagi.');
  }
  
  btn.disabled = false;
  btn.innerHTML = '<i class="fa-solid fa-user-plus mr-2"></i>Daftar Akun Sekarang';
});

// Input NIK hanya angka
document.getElementById('nik').addEventListener('input', function(e) {
  this.value = this.value.replace(/\D/g, '');
});
</script>
</body>
</html>
