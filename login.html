<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Puskesmas Sehat Bersama</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Segoe UI', system-ui, sans-serif; 
      background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
    }
    .container { max-width: 400px; margin: 0 auto; padding: 20px; width: 100%; }
    .card { 
      background: white; 
      padding: 35px 30px; 
      border-radius: 16px; 
      box-shadow: 0 10px 25px #0001; 
    }
    .logo { text-align: center; margin-bottom: 20px; }
    .logo img { width: 60px; }
    h1 { color: #1d4ed8; margin-bottom: 8px; text-align: center; font-size: 1.8rem; }
    .subtitle { color: #64748b; text-align: center; margin-bottom: 30px; font-size: 0.95rem; }
    .form-group { margin-bottom: 18px; }
    .form-group label { 
      display: block; 
      margin-bottom: 6px; 
      font-weight: 500; 
      color: #334155; 
      font-size: 0.9rem;
    }
    .form-group input, .form-group select { 
      width: 100%; 
      padding: 12px 14px; 
      border: 1px solid #cbd5e1; 
      border-radius: 8px; 
      font-size: 1rem;
      transition: all 0.2s;
    }
    .form-group input:focus, .form-group select:focus { 
      outline: none; 
      border-color: #1d4ed8;
      box-shadow: 0 0 0 3px #dbeafe;
    }
    .btn { 
      width: 100%; 
      padding: 13px; 
      border: none; 
      border-radius: 8px; 
      font-weight: 600; 
      font-size: 1rem; 
      cursor: pointer; 
      background: #1d4ed8; 
      color: white;
      transition: 0.2s;
    }
    .btn:hover { background: #1e40af; }
    .btn:disabled { background: #94a3b8; cursor: not-allowed; }
    .alert { 
      padding: 12px; 
      border-radius: 8px; 
      margin-bottom: 18px; 
      font-size: 0.9rem; 
    }
    .alert-error { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }
    .alert-success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
    .links { text-align: center; margin-top: 25px; color: #64748b; font-size: 0.9rem; }
    .links a { color: #047857; text-decoration: none; font-weight: 600; }
    .links a:hover { text-decoration: underline; }
    .back { text-align: center; margin-top: 15px; }
    .back a { color: #64748b; text-decoration: none; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">
        <img src="logo.png" alt="Puskesmas Sehat Bersama">
      </div>
      <h1>Login Akun</h1>
      <p class="subtitle">Masuk untuk ambil antrian online</p>
      
      <div id="alert"></div>

      <form id="login-form">
        <div class="form-group">
          <label>Login Sebagai</label>
          <select id="role">
            <option value="user">Masyarakat</option>
            <option value="admin">Admin Puskesmas</option>
          </select>
        </div>
        <div class="form-group">
          <label>NIK / Username</label>
          <input type="text" id="nik" placeholder="Masukkan NIK 16 digit / admin123" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Masukkan password" required>
        </div>
        <button type="submit" class="btn" id="btn-login">Login Sekarang</button>
      </form>

      <div class="links">
        Belum punya akun? <a href="register.html">Daftar di sini</a>
      </div>
      <div class="back">
        <a href="index.html">← Kembali ke Beranda</a>
      </div>
    </div>
  </div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyBuSyOsHl1tFl7HeCc1kUj8Hs_24J_x_XbQ8SlswB7dayVMCjVQyAgRZASrcjbUwiE/exec";

function showAlert(msg, type) {
  document.getElementById('alert').innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
}

document.getElementById('login-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('btn-login');
  btn.disabled = true;
  btn.textContent = 'Memproses...';
  
  const data = {
    action: 'login',
    role: document.getElementById('role').value,
    nik: document.getElementById('nik').value,
    password: document.getElementById('password').value
  };
  
  try {
    const res = await fetch(API_URL, { 
      method: 'POST', 
      body: JSON.stringify(data) 
    });
    const hasil = await res.json();
    
    if(hasil.status === 'ok') {
      showAlert('Login berhasil! Mengalihkan...', 'success');
      localStorage.setItem('user', JSON.stringify(hasil.user));
      
      setTimeout(() => {
        if(data.role === 'admin') {
          window.location.href = 'admin.html';
        } else {
          window.location.href = 'daftar.html'; // ke halaman ambil antrian
        }
      }, 1000);
    } else {
      showAlert(hasil.message || 'Login gagal. Cek NIK & password', 'error');
      btn.disabled = false;
      btn.textContent = 'Login Sekarang';
    }
  } catch(err) {
    showAlert('Gagal terhubung ke server. Coba lagi', 'error');
    btn.disabled = false;
    btn.textContent = 'Login Sekarang';
  }
});

// Auto-redirect kalo udah login
if(localStorage.getItem('user')) {
  const user = JSON.parse(localStorage.getItem('user'));
  if(user.role === 'admin') window.location.href = 'admin.html';
  else window.location.href = 'daftar.html';
}
</script>
</body>
</html>
