<!DOCTYPE html><html lang="id"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Transparansi - Puskesmas Sehat Bersama</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
<style>body{font-family:'Poppins',sans-serif}</style>
</head><body class="bg-gray-50 p-6">
<div class="max-w-6xl mx-auto">
  <h1 class="text-3xl font-black text-blue-600 mb-2">Dashboard Transparansi</h1>
  <p class="text-gray-600 mb-8">Data pelayanan Puskesmas Sehat Bersama update real-time</p>

  <div class="grid md:grid-cols-4 gap-6 mb-8">
    <div class="bg-white p-6 rounded-2xl shadow"><div class="text-sm text-gray-500">Pasien Hari Ini</div><div id="total" class="text-4xl font-black text-blue-600">0</div></div>
    <div class="bg-white p-6 rounded-2xl shadow"><div class="text-sm text-gray-500">Sedang Antri</div><div id="antri" class="text-4xl font-black text-yellow-600">0</div></div>
    <div class="bg-white p-6 rounded-2xl shadow"><div class="text-sm text-gray-500">Rata-rata Tunggu</div><div id="rata" class="text-4xl font-black text-green-600">0<span class="text-lg"> mnt</span></div></div>
    <div class="bg-white p-6 rounded-2xl shadow"><div class="text-sm text-gray-500">Status</div><div class="text-4xl font-black text-green-600">BUKA</div></div>
  </div>

  <div class="bg-white p-6 rounded-2xl shadow">
    <h2 class="font-bold text-lg mb-4">Poli Terpadat Hari Ini</h2>
    <canvas id="chartPoli"></canvas>
  </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyBuSyOsHl1tFl7HeCc1kUj8Hs_24J_x_XbQ8SlswB7dayVMCjVQyAgRZASrcjbUwiE/exec?action=";
let chart;

async function load() {
  const r = await fetch(API + 'getPublic');
  const d = await r.json();

  document.getElementById('total').textContent = d.totalHariIni;
  document.getElementById('antri').textContent = d.antrian.length;
  document.getElementById('rata').innerHTML = `${d.rataMenit}<span class="text-lg"> mnt</span>`;

  // Hitung poli
  const poliCount = {};
  d.antrian.forEach(x => { poliCount[x.Poli] = (poliCount[x.Poli]||0) + 1 });
  if(d.dipanggil) poliCount[d.dipanggil.Poli] = (poliCount[d.dipanggil.Poli]||0) + 1;

  const ctx = document.getElementById('chartPoli');
  if(chart) chart.destroy();
  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: Object.keys(poliCount),
      datasets: [{ label: 'Jumlah Pasien', data: Object.values(poliCount), backgroundColor: '#0d6efd' }]
    },
    options: { responsive: true, plugins: { legend: { display: false } } }
  });
}
load(); setInterval(load, 10000);
</script></body></html>
