<section class="form-antrian">
  <h3>Form Pendaftaran Antrian Online</h3>
  <form action="#" method="post">
    <label for="nama">Nama Lengkap:</label>
    <input type="text" id="nama" name="nama" required>

    <label for="nik">NIK:</label>
    <input type="text" id="nik" name="nik" required>

    <label for="layanan">Pilih Layanan:</label>
    <select id="layanan" name="layanan" required>
      <option value="umum">Pemeriksaan Umum</option>
      <option value="gigi">Pemeriksaan Gigi</option>
      <option value="anak">Pemeriksaan Anak</option>
      <option value="imunisasi">Imunisasi</option>
    </select>

    <label for="tanggal">Tanggal Kunjungan:</label>
    <input type="date" id="tanggal" name="tanggal" required>

    <button type="submit" class="btn">Kirim Pendaftaran</button>
  </form>
</section>
