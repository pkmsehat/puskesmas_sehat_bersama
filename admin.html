<!DOCTYPE html><html lang="id"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Antrian</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
<style>body{font-family:'Poppins',sans-serif}</style>
</head><body class="bg-gray-100 p-4">
<div id="login" class="max-w-sm mx-auto mt-20 bg-white p-8 rounded-2xl shadow-lg">
  <h1 class="text-2xl font-bold text-center text-blue-600 mb-6">Login Petugas</h1>
  <input id="pass" type="password" placeholder="Password Admin" class="w-full p-3 border-2 rounded-lg mb-3">
  <input id="petugas" type="text" placeholder="Nama Anda" class="w-full p-3 border-2 rounded-lg mb-4">
  <button onclick="login()" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold">Masuk</button>
</div>

<div id="panel" class="hidden max-w-2xl mx-auto">
  <div class="bg-white p-6 rounded-2xl shadow-lg mb-4">
    <h1 class="text-2xl font-bold text-blue-600">Panel Loket 1</h1>
    <p id="info" class="mt-2 text-gray-600">Memuat...</p>
    <button onclick="panggil()" class="w-full bg-green-600 text-white p-4 rounded-xl font-bold text-lg mt-4">📢 PANGGIL BERIKUTNYA</button>
  </div>
  <div class="bg-white p-6 rounded-2xl shadow-lg">
    <h2 class="font-bold mb-3">5 Antrian Berikutnya</h2>
    <table class="w-full text-sm"><tbody id="list"></tbody></table>
  </div>
</div>

<script>
const API = "PASTE_URL_APPS_SCRIPT?action=";
let PASS = '', PETUGAS = '';

async function login() {
  PASS = document.getElementById('pass').value;
  PETUGAS = document.getElementById('petugas').value;
  if(!PASS||!PETUGAS) return alert('Isi semua');
  const r = await fetch(`${API}panggil&pass=${PASS}&test=1`);
  const t = await r.text();
  if(t.includes('salah')) return alert('Password salah');
  document.getElementById('login').classList.add('hidden');
  document.getElementById('panel').classList.remove('hidden');
  load(); setInterval(load, 3000);
}

async function load() {
  const r = await fetch(API + 'getPublic');
  const d = await r.json();
  document.getElementById('info').innerHTML = d.dipanggil
   ? `Sedang dipanggil: <b>${d.dipanggil.No_Antrian} - ${d.dipanggil.Nama}</b> | Total hari ini: ${d.totalHariIni}`
    : `Belum ada yang dipanggil | Total hari ini: ${d.totalHariIni}`;
  document.getElementById('list').innerHTML = d.antrian.map(x =>
    `<tr class="border-b"><td class="py-2 font-bold">${x.No_Antrian}</td><td>${x.Nama}</td><td>${x.Poli}</td></tr>`
  ).join('');
}

async function panggil() {
  await fetch(`${API}panggil&pass=${PASS}&petugas=${PETUGAS}&loket=Loket 1`);
  load();
}
</script></body></html>
